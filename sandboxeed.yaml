sandbox:
  build:
    dockerfile: Dockerfile.sandbox
  image: sandboxeed-sandbox
  volumes:
    - ~/.claude:/home/node/.claude
    - ~/.codex:/home/node/.codex
    - ~/.claude.json:/home/node/.claude.json
    - ~/.gitconfig:/home/node/.gitconfig:ro
    - ~/.ssh/ai_agent_key:/home/node/.ssh/id_rsa:ro
    - ./examples/git.conf:/home/node/.ssh/config:ro
    - ./examples/claude/settings.json:/home/node/.claude/settings.json
    - ./examples/codex/config.toml:/home/node/.codex/config.toml
  environment:
    - DISABLE_AUTOUPDATER=1
  docker: true
  domains:
    - github.com
    - githubusercontent.com
    - npmjs.org
    - api.anthropic.com
    - api.openai.com
    - claude.ai
    - chatgpt.com
    - proxy.golang.org
    - .docker.com
    - .docker.io
    - .cloudflarestorage.com