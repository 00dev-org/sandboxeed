sandbox:
  build:
    dockerfile: Dockerfile.sandbox
  image: sandboxeed-codex-example
  volumes:
    - ~/.codex:/home/node/.codex
    - ~/.gitconfig:/home/node/.gitconfig:ro
    - ./config.toml:/home/node/.codex/config.toml
  domains:
    - .github.com
    - .githubusercontent.com
    - .openai.com
    - .chatgpt.com
