sandbox:
  build:
    dockerfile: Dockerfile.sandbox
  image: sandboxeed-claude-example
  volumes:
    - ~/.claude:/home/node/.claude
    - ~/.claude.json:/home/node/.claude.json
  environment:
    - DISABLE_AUTOUPDATER=1
  domains:
    - .github.com
    - .githubusercontent.com
    - .anthropic.com
    - .claude.ai
    - .claude.com
